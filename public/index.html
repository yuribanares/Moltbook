<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moltbook AI Agent ni Uly - Tech Feedback Only</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #121212;
            color: #e0e0e0;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        h1 {
            color: #00e5ff;
            margin: 0;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        button {
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
            min-width: 120px;
            /* Ensure equal size based on longest text */
        }

        #start-btn {
            background: #4caf50;
            color: white;
        }

        #start-btn:hover {
            background: #45a049;
        }

        #stop-btn {
            background: #f44336;
            color: white;
        }

        #stop-btn:hover {
            background: #d32f2f;
        }

        #refresh-btn {
            background: #00e5ff;
            color: #121212;
        }

        #refresh-btn:hover {
            background: #00b8d4;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        button:active {
            transform: scale(0.98);
        }

        .card {
            background: #1e1e1e;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 4px solid #00e5ff;
        }

        .timestamp {
            font-size: 0.8rem;
            color: #888;
        }

        .meta {
            font-size: 0.9rem;
            color: #bbb;
            margin-bottom: 10px;
        }

        .content {
            line-height: 1.5;
        }

        .tag {
            display: inline-block;
            background: #333;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            margin-right: 5px;
        }
    </style>
</head>

<body>
    <div class="container">
        <header style="align-items: flex-start;">
            <div>
                <h1>Moltbook AI Insights Only Made by yours trully - Uly</h1>
                <div style="margin-top: 10px; display: flex; align-items: center; gap: 10px;">
                    <label for="post-limit" style="font-size: 0.9rem; color: #888;">Display Limit:</label>
                    <select id="post-limit"
                        style="background: #333; color: white; border: 1px solid #444; padding: 4px; border-radius: 4px;">
                        <option value="5">Show 5</option>
                        <option value="10">Show 10</option>
                        <option value="15">Show 15</option>
                        <option value="20" selected>Show 20</option>
                    </select>
                </div>
            </div>
            <div class="controls">
                <button id="start-btn">Start</button>
                <button id="stop-btn">Stop</button>
                <button id="refresh-btn">Refresh Now</button>
            </div>
        </header>

        <div id="status-area" style="margin-bottom: 20px;">
            <div id="agent-status" style="font-weight: bold; margin-bottom: 10px;">
                Agent Status: <span id="run-state">Checking...</span>
            </div>
            <div id="status" style="color: #888;">Total Insights: 0</div>
        </div>

        <main id="feedback-list">
            <!-- Insights will be rendered here -->
            <div class="card">
                <div class="content">Push "Start" to begin collecting insights...</div>
            </div>
        </main>
    </div>

    <script>
        let hasStarted = false;

        async function fetchFeedback() {
            if (!hasStarted) {
                return;
            }

            try {
                const response = await fetch('/feedback.json');
                if (!response.ok) throw new Error('Not found');
                const data = await response.json();
                renderFeedback(data);
            } catch (err) {
                console.log('No feedback data yet.');
            }
        }

        function renderPlaceholder() {
            const list = document.getElementById('feedback-list');
            if (!list) return;
            list.innerHTML = `
                <div class="card">
                    <div class="content">Push "Start" to begin collecting insights...</div>
                </div>
            `;
            const statusEl = document.getElementById('status');
            if (statusEl) statusEl.innerText = 'Scanning...';
        }

        function renderFeedback(items) {
            const list = document.getElementById('feedback-list');
            if (!list) return;

            const limit = parseInt(document.getElementById('post-limit').value) || 20;

            if (!items || items.length === 0) {
                renderPlaceholder();
                return;
            }

            list.innerHTML = '';
            // Limit the items shown
            const displayedItems = items.slice(-limit).reverse();

            displayedItems.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="meta">
                        <span class="tag">${(item.type || 'insight').toUpperCase()}</span> 
                        <span class="timestamp">${new Date(item.timestamp).toLocaleString()}</span>
                    </div>
                    <div class="content">${item.content}</div>
                `;
                list.appendChild(card);
            });

            const statusEl = document.getElementById('status');
            if (statusEl) statusEl.innerText = `Total Insights: ${items.length}`;
        }

        async function checkStatus() {
            const stateText = document.getElementById('run-state');
            const startBtn = document.getElementById('start-btn');
            const stopBtn = document.getElementById('stop-btn');
            if (!stateText || !startBtn || !stopBtn) return;

            try {
                const response = await fetch('/api/status');
                if (!response.ok) throw new Error('Status check failed');
                const data = await response.json();

                if (data.starting || data.running) {
                    hasStarted = true;
                    if (data.starting) {
                        stateText.innerText = 'STARTING...';
                        stateText.style.color = '#ff9800';
                    } else {
                        stateText.innerText = 'RUNNING';
                        stateText.style.color = '#4caf50';
                    }
                    startBtn.disabled = true;
                    stopBtn.disabled = false;
                } else {
                    stateText.innerText = 'STOPPED';
                    stateText.style.color = '#f44336';
                    startBtn.disabled = false;
                    stopBtn.disabled = true;
                }
            } catch (err) {
                console.error('Failed to check status:', err);
                // Fallback: if we can't reach the server, allow user to try starting again
                stateText.innerText = 'OFFLINE';
                stateText.style.color = '#888';
                startBtn.disabled = false;
            }
        }

        document.getElementById('start-btn').addEventListener('click', async () => {
            const startBtn = document.getElementById('start-btn');
            startBtn.disabled = true;
            startBtn.innerText = 'Starting...';

            try {
                const res = await fetch('/api/start', { method: 'POST' });
                if (res.ok) {
                    hasStarted = true;
                    await checkStatus();
                    await fetchFeedback();
                }
            } catch (err) {
                console.error('Start failed', err);
            } finally {
                startBtn.innerText = 'Start';
                await checkStatus(); // Ensure UI is in sync
            }
        });

        document.getElementById('stop-btn').addEventListener('click', async () => {
            const stopBtn = document.getElementById('stop-btn');
            stopBtn.disabled = true;
            stopBtn.innerText = 'Stopping...';

            try {
                const res = await fetch('/api/stop', { method: 'POST' });
                if (res.ok) {
                    await checkStatus();
                }
            } catch (err) {
                console.error('Stop failed', err);
            } finally {
                stopBtn.innerText = 'Stop';
                await checkStatus(); // Ensure UI is in sync
            }
        });

        document.getElementById('refresh-btn').addEventListener('click', async () => {
            const btn = document.getElementById('refresh-btn');
            const originalText = btn.innerText;
            btn.innerText = 'Resetting & Refreshing...';
            btn.disabled = true;

            try {
                // Stop the agent to reset button states
                await fetch('/api/stop', { method: 'POST' });

                // Ensure we can show data
                hasStarted = true;

                // Sync UI buttons (will enable Start, disable Stop)
                await checkStatus();

                // Fetch latest data
                await fetchFeedback();
            } catch (err) {
                console.error('Refresh task failed', err);
            } finally {
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.disabled = false;
                }, 1000);
            }
        });

        document.getElementById('post-limit').addEventListener('change', fetchFeedback);

        setInterval(fetchFeedback, 5000);
        setInterval(checkStatus, 3000);

        // Initial setup
        checkStatus().then(() => {
            if (hasStarted) fetchFeedback();
            else renderPlaceholder();
        });
    </script>
</body>

</html>
